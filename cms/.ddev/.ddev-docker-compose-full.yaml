name: ddev-cms
networks:
    ddev_default:
        external: true
        name: ddev_default
    default:
        labels:
            com.ddev.platform: ddev
        name: ddev-cms_default
services:
    db:
        build:
            args:
                BASE_IMAGE: postgres:17
                gid: "999"
                uid: "502"
                username: tylernford
            context: /Users/tylernford/sites/_firebelly/firestarter/cms/.ddev/.dbimageBuild
            dockerfile: Dockerfile
        cap_add:
            - SYS_NICE
        command:
            - -c
            - config_file=/etc/postgresql/postgresql.conf
            - -c
            - hba_file=/etc/postgresql/pg_hba.conf
        container_name: ddev-cms-db
        environment:
            BITNAMI_VOLUME_DIR: ""
            COLUMNS: "111"
            DDEV_DATABASE: postgres:17
            DDEV_DATABASE_FAMILY: postgres
            DDEV_GOARCH: amd64
            DDEV_GOOS: darwin
            DDEV_HOSTNAME: cms.ddev.site
            DDEV_PHP_VERSION: "8.3"
            DDEV_PRIMARY_URL: https://cms.ddev.site
            DDEV_PRIMARY_URL_PORT: "443"
            DDEV_PRIMARY_URL_WITHOUT_PORT: https://cms.ddev.site
            DDEV_PROJECT: cms
            DDEV_PROJECT_TYPE: craftcms
            DDEV_ROUTER_HTTP_PORT: "80"
            DDEV_ROUTER_HTTPS_PORT: "443"
            DDEV_SCHEME: https
            DDEV_SITENAME: cms
            DDEV_TLD: ddev.site
            DOCKER_IP: 127.0.0.1
            HOST_DOCKER_INTERNAL_IP: ""
            IS_DDEV_PROJECT: "true"
            LINES: "59"
            MYSQL_HISTFILE: /mnt/ddev-global-cache/mysqlhistory/cms-db/mysql_history
            PGDATABASE: db
            PGHOST: 127.0.0.1
            PGPASSWORD: db
            PGUSER: db
            POSTGRES_DB: db
            POSTGRES_PASSWORD: db
            POSTGRES_USER: db
            TZ: America/Chicago
            USER: tylernford
        healthcheck:
            interval: 1s
            retries: 70
            start_interval: 1s
            start_period: 2m0s
            test:
                - CMD-SHELL
                - /postgres_healthcheck.sh
            timeout: 1m10s
        hostname: cms-db
        image: postgres:17-cms-built
        labels:
            com.ddev.app-type: craftcms
            com.ddev.approot: /Users/tylernford/sites/_firebelly/firestarter/cms
            com.ddev.platform: ddev
            com.ddev.site-name: cms
        networks:
            ddev_default: null
            default: null
        ports:
            - host_ip: 127.0.0.1
              mode: ingress
              protocol: tcp
              target: 5432
        restart: "no"
        stop_grace_period: 1m0s
        user: 999:999
        volumes:
            - source: database
              target: /var/lib/postgresql/data
              type: volume
              volume:
                nocopy: true
            - bind:
                create_host_path: true
              source: /Users/tylernford/sites/_firebelly/firestarter/cms/.ddev
              target: /mnt/ddev_config
              type: bind
            - bind:
                create_host_path: true
              source: /Users/tylernford/sites/_firebelly/firestarter/cms/.ddev/db_snapshots
              target: /mnt/snapshots
              type: bind
            - source: ddev-global-cache
              target: /mnt/ddev-global-cache
              type: volume
              volume: {}
        working_dir: /var/lib/postgresql
    web:
        build:
            args:
                BASE_IMAGE: ddev/ddev-webserver:v1.24.5
                DDEV_DATABASE: postgres:17
                DDEV_PHP_VERSION: "8.3"
                gid: "20"
                uid: "502"
                username: tylernford
            context: /Users/tylernford/sites/_firebelly/firestarter/cms/.ddev/.webimageBuild
            dockerfile: Dockerfile
        cap_add:
            - SYS_PTRACE
        command:
            - /pre-start.sh
        container_name: ddev-cms-web
        environment:
            COLUMNS: "111"
            COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
            COREPACK_HOME: /mnt/ddev-global-cache/corepack
            CRAFT_DB_DATABASE: db
            CRAFT_DB_DRIVER: pgsql
            CRAFT_DB_PASSWORD: db
            CRAFT_DB_PORT: "5432"
            CRAFT_DB_SERVER: db
            CRAFT_DB_USER: db
            CRAFT_WEB_ROOT: /var/www/html/web
            DDEV_APPROOT: /var/www/html
            DDEV_COMPOSER_ROOT: /var/www/html
            DDEV_DATABASE: postgres:17
            DDEV_DATABASE_FAMILY: postgres
            DDEV_DOCROOT: web
            DDEV_FILES_DIR: ""
            DDEV_FILES_DIRS: ""
            DDEV_GOARCH: amd64
            DDEV_GOOS: darwin
            DDEV_HOSTNAME: cms.ddev.site
            DDEV_MUTAGEN_ENABLED: "false"
            DDEV_PHP_VERSION: "8.3"
            DDEV_PRIMARY_URL: https://cms.ddev.site
            DDEV_PRIMARY_URL_PORT: "443"
            DDEV_PRIMARY_URL_WITHOUT_PORT: https://cms.ddev.site
            DDEV_PROJECT: cms
            DDEV_PROJECT_TYPE: craftcms
            DDEV_ROUTER_HTTP_PORT: "80"
            DDEV_ROUTER_HTTPS_PORT: "443"
            DDEV_SCHEME: https
            DDEV_SITENAME: cms
            DDEV_TLD: ddev.site
            DDEV_VERSION: v1.24.5
            DDEV_WEB_ENTRYPOINT: /mnt/ddev_config/web-entrypoint.d
            DDEV_WEBSERVER_TYPE: nginx-fpm
            DDEV_XDEBUG_ENABLED: "false"
            DDEV_XHPROF_MODE: prepend
            DEPLOY_NAME: local
            DOCKER_IP: 127.0.0.1
            DOCROOT: web
            DRUSH_OPTIONS_URI: https://cms.ddev.site
            HOST_DOCKER_INTERNAL_IP: ""
            HTTP_EXPOSE: 80:80,8025:8025
            HTTPS_EXPOSE: 443:80,8026:8025
            IS_DDEV_PROJECT: "true"
            LINES: "59"
            MAILPIT_SMTP_HOSTNAME: 127.0.0.1
            MAILPIT_SMTP_PORT: "1025"
            MYSQL_HISTFILE: /mnt/ddev-global-cache/mysqlhistory/cms-web/mysql_history
            NODE_EXTRA_CA_CERTS: /mnt/ddev-global-cache/mkcert/rootCA.pem
            PGDATABASE: db
            PGHOST: db
            PGPASSWORD: db
            PGUSER: db
            PHP_IDE_CONFIG: serverName=cms.ddev.site
            PRIMARY_SITE_URL: https://cms.ddev.site
            SSH_AUTH_SOCK: /home/.ssh-agent/socket
            START_SCRIPT_TIMEOUT: "30"
            TZ: America/Chicago
            USER: tylernford
            VIRTUAL_HOST: cms.ddev.site
            npm_config_cache: /mnt/ddev-global-cache/npm
        external_links:
            - ddev-router:cms.ddev.site
        healthcheck:
            interval: 1s
            retries: 70
            start_interval: 1s
            start_period: 2m0s
            timeout: 1m10s
        hostname: cms-web
        image: ddev/ddev-webserver:v1.24.5-cms-built
        labels:
            com.ddev.app-type: craftcms
            com.ddev.approot: /Users/tylernford/sites/_firebelly/firestarter/cms
            com.ddev.platform: ddev
            com.ddev.site-name: cms
        networks:
            ddev_default: null
            default: null
        ports:
            - host_ip: 127.0.0.1
              mode: ingress
              protocol: tcp
              target: 80
            - host_ip: 127.0.0.1
              mode: ingress
              protocol: tcp
              target: 443
            - host_ip: 127.0.0.1
              mode: ingress
              protocol: tcp
              target: 8025
        restart: "no"
        user: "502:20"
        volumes:
            - consistency: cached
              source: /Users/tylernford/sites/_firebelly/firestarter/cms
              target: /var/www/html
              type: bind
            - bind:
                create_host_path: true
              read_only: true
              source: /Users/tylernford/sites/_firebelly/firestarter/cms/.ddev
              target: /mnt/ddev_config
              type: bind
            - bind:
                create_host_path: true
              source: /Users/tylernford/sites/_firebelly/firestarter/cms/.ddev/xhprof
              target: /usr/local/bin/xhprof
              type: bind
            - source: ddev-global-cache
              target: /mnt/ddev-global-cache
              type: volume
              volume: {}
            - source: ddev-ssh-agent_socket_dir
              target: /home/.ssh-agent
              type: volume
              volume: {}
        working_dir: /var/www/html/
    xhgui:
        container_name: ddev-cms-xhgui
        depends_on:
            db:
                condition: service_started
                required: true
        environment:
            DDEV_DATABASE_FAMILY: postgres
            HTTP_EXPOSE: 8143:80
            HTTPS_EXPOSE: 8142:80
            TZ: America/Chicago
            VIRTUAL_HOST: cms.ddev.site
            XHGUI_PDO_PASS: db
            XHGUI_PDO_USER: db
            XHGUI_SAVE_HANDLER: pdo
        image: ddev/ddev-xhgui:v1.24.5
        labels:
            com.ddev.approot: /Users/tylernford/sites/_firebelly/firestarter/cms
            com.ddev.site-name: cms
        links:
            - db
        networks:
            ddev_default: null
            default: null
        profiles:
            - xhgui
        restart: "no"
volumes:
    database:
        external: true
        name: cms-postgres
    ddev-global-cache:
        external: true
        name: ddev-global-cache
    ddev-ssh-agent_socket_dir:
        external: true
        name: ddev-ssh-agent_socket_dir
